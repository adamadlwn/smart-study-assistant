{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    body {
        background-color: #f0f0f0;
    }

    .confirm-wrapper {
        display: flex;
        min-height: 70vh;
        align-items: center;
        justify-content: center;
    }

    .confirm-card {
        background: #fff;
        border-radius: 16px;
        padding: 50px 45px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        max-width: 420px;
        width: 100%;
    }

    .confirm-card .google-icon {
        margin-bottom: 20px;
    }

    .confirm-card h2 {
        font-weight: 700;
        font-size: 1.4rem;
        color: #1a1a2e;
        margin-bottom: 14px;
    }

    .confirm-card p {
        color: #666;
        font-size: 0.92rem;
        margin-bottom: 28px;
        line-height: 1.5;
    }

    .btn-continue {
        background-color: #4a6cf7;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 40px;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn-continue:hover {
        background-color: #3a57d7;
    }

    .btn-cancel {
        display: block;
        margin-top: 16px;
        color: #888;
        text-decoration: none;
        font-size: 0.85rem;
    }

    .btn-cancel:hover {
        color: #4a6cf7;
        text-decoration: underline;
    }
</style>

<div class="confirm-wrapper">
    <div class="confirm-card">
        <div class="google-icon">
            <svg width="40" height="40" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
        </div>

        <h2>Sign in with Google</h2>
        <p>Kamu akan masuk menggunakan akun Google. Klik lanjutkan untuk melanjutkan proses login.</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-continue">Lanjutkan</button>
        </form>

        <a href="{% url 'login' %}" class="btn-cancel">Batal</a>
    </div>
</div>
{% endblock %}
