{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    body {
        background-color: #f0f0f0;
    }

    .login-wrapper {
        display: flex;
        min-height: 80vh;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        display: flex;
        width: 100%;
        max-width: 860px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .login-left {
        background-color: #b0b0b0;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 30px;
        color: #fff;
    }

    .login-left img {
        width: 180px;
        margin-bottom: 16px;
    }

    .login-left .brand-name {
        font-weight: 700;
        font-size: 1.1rem;
        color: #fff;
        margin-bottom: 32px;
    }

    .login-left .create-account-link {
        color: #fff;
        text-decoration: none;
        font-size: 0.9rem;
    }

    .login-left .create-account-link:hover {
        text-decoration: underline;
    }

    .login-right {
        background-color: #fff;
        flex: 1.2;
        padding: 50px 45px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .login-right .welcome-text {
        color: #4a6cf7;
        font-size: 0.95rem;
        font-weight: 500;
        margin-bottom: 4px;
    }

    .login-right h2 {
        font-weight: 700;
        font-size: 2rem;
        margin-bottom: 28px;
        color: #1a1a2e;
    }

    .input-group-custom {
        border: none;
        border-bottom: 1.5px solid #ccc;
        border-radius: 0;
        margin-bottom: 20px;
    }

    .input-group-custom .form-control {
        border: none;
        border-radius: 0;
        padding-left: 8px;
        font-size: 0.9rem;
        background: transparent;
        box-shadow: none;
    }

    .input-group-custom .form-control:focus {
        box-shadow: none;
        border-bottom: 1.5px solid #4a6cf7;
    }

    .input-group-custom .input-icon {
        color: #aaa;
        font-size: 0.9rem;
        padding-right: 8px;
        background: transparent;
        border: none;
    }

    .btn-login {
        background-color: #4a6cf7;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 28px;
        font-size: 0.9rem;
        font-weight: 500;
        margin-top: 8px;
        transition: background 0.2s;
    }

    .btn-login:hover {
        background-color: #3a57d7;
        color: #fff;
    }

    .divider-text {
        font-size: 0.85rem;
        color: #888;
        margin: 18px 0 12px;
    }

    .btn-google {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1.5px solid #ddd;
        border-radius: 6px;
        padding: 7px 18px;
        font-size: 0.88rem;
        color: #444;
        background: #fff;
        text-decoration: none;
        width: fit-content;
        transition: box-shadow 0.2s;
    }

    .btn-google:hover {
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        color: #444;
    }

    .alert-danger {
        font-size: 0.85rem;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 14px;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Kiri -->
        <div class="login-left">
            <div class="text-center">
                <!-- Ganti src dengan path gambar dari Figma kamu -->
                <img src="{% static 'images/SSA.png' %}" alt="SSA Illustration"
                     onerror="this.style.display='none'">
                <div class="brand-name">Smart Study Assistant</div>
            </div>
            <a href="{% url 'register' %}" class="create-account-link">Create an account</a>
        </div>

        <!-- Kanan -->
        <div class="login-right">
            <p class="welcome-text">Hey Welcome back!</p>
            <h2>Sign In</h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">
                ...
            </form>

                <!-- Username -->
                <div class="d-flex align-items-center input-group-custom">
                    <span class="input-icon">&#128100;</span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Your Name" required>
                </div>

                <!-- Password -->
                <div class="d-flex align-items-center input-group-custom">
                    <span class="input-icon">&#128274;</span>
                    <input type="password" name="password" class="form-control"
                           placeholder="Your Password" required>
                </div>

                <!-- Remember Me -->
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="rememberMe" name="remember">
                    <label class="form-check-label" for="rememberMe" style="font-size:0.88rem;">
                        Remember me
                    </label>
                </div>

                <button type="submit" class="btn btn-login">Log in</button>
            </form>

            <p class="divider-text">Or Login with</p>
            <a href="#" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Google
            </a>
        </div>

    </div>
</div>
{% endblock %}
