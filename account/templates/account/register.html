{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    body {
        background-color: #f0f0f0;
    }

    .register-wrapper {
        display: flex;
        min-height: 80vh;
        align-items: center;
        justify-content: center;
    }

    .register-card {
        display: flex;
        width: 100%;
        max-width: 860px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .register-left {
        background-color: #b0b0b0;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 30px;
        color: #fff;
        text-align: center;
    }

    .register-left img {
        width: 180px;
        margin-bottom: 16px;
    }

    .register-left .brand-name {
        font-weight: 700;
        font-size: 1.1rem;
        color: #fff;
    }

    .register-right {
        background-color: #fff;
        flex: 1.2;
        padding: 50px 45px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .register-right .welcome-text {
        color: #4a6cf7;
        font-size: 0.95rem;
        font-weight: 500;
        margin-bottom: 4px;
    }

    .register-right h2 {
        font-weight: 700;
        font-size: 2rem;
        margin-bottom: 28px;
        color: #1a1a2e;
    }

    .input-group-custom {
        border: none;
        border-bottom: 1.5px solid #ccc;
        border-radius: 0;
        margin-bottom: 20px;
    }

    .input-group-custom .form-control {
        border: none;
        border-radius: 0;
        padding-left: 8px;
        font-size: 0.9rem;
        background: transparent;
        box-shadow: none;
    }

    .input-group-custom .form-control:focus {
        box-shadow: none;
        border-bottom: 1.5px solid #4a6cf7;
    }

    .input-group-custom .input-icon {
        color: #aaa;
        font-size: 0.9rem;
        padding-right: 8px;
        background: transparent;
        border: none;
    }

    .btn-register {
        background-color: #4a6cf7;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 28px;
        font-size: 0.9rem;
        font-weight: 500;
        margin-top: 8px;
        transition: background 0.2s;
    }

    .btn-register:hover {
        background-color: #3a57d7;
        color: #fff;
    }

    .back-to-login {
        font-size: 0.88rem;
        color: #555;
        text-decoration: none;
        display: inline-block;
        margin-top: 14px;
    }

    .back-to-login:hover {
        color: #4a6cf7;
        text-decoration: underline;
    }

    .alert-danger, .alert-success {
        font-size: 0.85rem;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 14px;
    }
</style>

<div class="register-wrapper">
    <div class="register-card">

        <!-- Kiri -->
        <div class="register-left">
            <!-- Ganti src dengan path gambar dari Figma kamu -->
            <img src="{% static 'images/SSA.png' %}" alt="SSA Illustration"
                 onerror="this.style.display='none'">
            <div class="brand-name">Smart Study Assistant</div>
        </div>

        <!-- Kanan -->
        <div class="register-right">
            <p class="welcome-text">Hey Welcome back!</p>
            <h2>Sign Up</h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'register' %}">
                {% csrf_token %}

                <!-- Username -->
                <div class="d-flex align-items-center input-group-custom">
                    <span class="input-icon">&#128100;</span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Your Name" required>
                </div>

                <!-- Password -->
                <div class="d-flex align-items-center input-group-custom">
                    <span class="input-icon">&#128274;</span>
                    <input type="password" name="password1" class="form-control"
                           placeholder="Your Password" required>
                </div>

                <!-- Konfirmasi Password -->
                <div class="d-flex align-items-center input-group-custom">
                    <span class="input-icon">&#128274;</span>
                    <input type="password" name="password2" class="form-control"
                           placeholder="Confirm Password" required>
                </div>

                <button type="submit" class="btn btn-register">Register</button>
            </form>

            <a href="{% url 'login' %}" class="back-to-login">Back to Sign in/Login</a>
        </div>

    </div>
</div>
{% endblock %}
